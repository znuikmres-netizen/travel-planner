<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="6/22-6/25 大阪與京都旅遊規劃、記帳、行李、伴手禮與 Google Maps 收藏順路排程 App"
    />
    <title>大阪・京都 6/22-6/25 旅遊規劃</title>
    <style>:root {
  --ivory: #fffaf0;
  --cream: #fffdf7;
  --coffee: #9d8265;
  --coffee-deep: #5a4638;
  --coffee-soft: #d6c3aa;
  --taupe: #f1e6d7;
  --taupe-strong: #e3d0b7;
  --yellow: #ffd84d;
  --yellow-deep: #e3a92b;
  --rose: #d78473;
  --ink: #3f3027;
  --shadow: #bfa27d;
  --line: #b39473;
  font-family: "PingFang TC", "PingFang SC", "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-width: 320px;
  min-height: 100vh;
  color: var(--ink);
  background: var(--ivory);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

button,
input,
textarea,
select {
  font: inherit;
}

button,
a {
  -webkit-tap-highlight-color: transparent;
}

button {
  color: inherit;
}

a {
  color: inherit;
  text-decoration: none;
}

.doodle-layer {
  position: fixed;
  inset: 0;
  z-index: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0.72;
  pointer-events: none;
  mix-blend-mode: multiply;
}

.app-shell {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  padding: 30px 42px 96px 136px;
}

.sticker {
  background: rgba(255, 253, 247, 0.94);
  border: 2px solid var(--line);
  border-radius: 8px;
  box-shadow: 8px 8px 0 var(--shadow);
}

.side-nav {
  position: fixed;
  top: 92px;
  left: 42px;
  width: 76px;
  padding: 10px 8px;
  display: grid;
  gap: 10px;
}

.side-nav button {
  min-height: 58px;
  border: 1.5px solid transparent;
  border-radius: 8px;
  background: transparent;
  font-size: 13px;
  font-weight: 800;
  cursor: pointer;
}

.side-nav button:hover,
.side-nav button.active {
  background: var(--yellow);
  border-color: var(--yellow-deep);
  box-shadow: 4px 4px 0 rgba(157, 130, 101, 0.42);
}

.side-nav button.active {
  transform: translate(-2px, -2px);
  box-shadow: 6px 6px 0 var(--coffee-soft);
}

.workspace {
  width: min(1280px, 100%);
  margin: 0 auto;
  min-width: 0;
}

.page-header {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 24px;
  margin-bottom: 16px;
}

.header-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.page-header p {
  margin: 0 0 4px;
  color: var(--coffee);
  font-size: 14px;
  font-weight: 900;
  letter-spacing: 0;
}

.page-header h1 {
  margin: 0;
  font-size: clamp(30px, 3.8vw, 42px);
  line-height: 1.05;
  font-weight: 950;
  letter-spacing: 0;
}

.page-header h1 span {
  display: inline-block;
  margin-left: 8px;
}

.outline-button,
.ghost-button,
.outline-link,
.link-button {
  border: 1.5px solid var(--line);
  border-radius: 7px;
  background: var(--cream);
  font-weight: 900;
  cursor: pointer;
}

.outline-button {
  padding: 12px 16px;
  box-shadow: 4px 4px 0 var(--coffee-soft);
}

.grid-board {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) minmax(390px, 1.08fr);
  gap: 20px;
  align-items: stretch;
  min-width: 0;
}

.card {
  padding: 20px;
  min-height: 246px;
  min-width: 0;
}

.card.is-focused {
  outline: 3px solid var(--yellow-deep);
  outline-offset: 4px;
  box-shadow: 11px 11px 0 var(--yellow-deep), 16px 16px 0 var(--shadow);
  transform: translate(-2px, -2px);
}

.itinerary-card {
  grid-column: span 2;
  min-height: 430px;
}

.expense-card {
  min-height: 430px;
}

.maps-card {
  grid-column: span 1;
}

.card-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 14px;
}

.card-title h2 {
  margin: 0;
  font-size: 28px;
  line-height: 1;
  font-weight: 950;
}

.card-title span,
.doodle-chip {
  color: var(--coffee);
  font-size: 13px;
  font-weight: 900;
}

.ghost-button {
  padding: 8px 10px;
  color: var(--coffee-deep);
}

.date-tabs {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  width: 100%;
  max-width: 100%;
  min-width: 0;
  padding: 2px 4px 12px;
  scrollbar-width: thin;
}

.date-tab {
  min-width: 132px;
  padding: 10px 12px;
  border: 1.5px solid var(--line);
  border-radius: 8px;
  background: rgba(255, 253, 247, 0.95);
  cursor: pointer;
  box-shadow: 4px 4px 0 rgba(191, 162, 125, 0.45);
}

.date-tab strong,
.date-tab span {
  display: block;
}

.date-tab strong {
  font-size: 15px;
  font-weight: 950;
}

.date-tab span {
  color: var(--coffee);
  font-size: 12px;
  font-weight: 800;
}

.date-tab.active {
  background: var(--yellow);
  border-color: var(--yellow-deep);
}

.itinerary-body {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(220px, 0.46fr);
  gap: 18px;
  align-items: stretch;
  margin-top: 8px;
  min-width: 0;
}

.timeline {
  min-height: 300px;
  min-width: 0;
}

.timeline-row {
  display: grid;
  grid-template-columns: 58px 24px minmax(0, 1fr);
  gap: 12px;
  align-items: start;
  min-height: 47px;
}

.time {
  padding-top: 2px;
  font-size: 17px;
  font-weight: 950;
}

.rail {
  position: relative;
  min-height: 50px;
}

.rail::before {
  content: "";
  position: absolute;
  left: 10px;
  top: 17px;
  bottom: -10px;
  width: 2px;
  background: var(--coffee-soft);
}

.timeline-row:last-child .rail::before {
  display: none;
}

.rail span {
  display: block;
  width: 14px;
  height: 14px;
  margin: 5px 0 0 4px;
  border: 2px solid var(--coffee);
  border-radius: 50%;
  background: var(--taupe);
}

.stop-title {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
}

.stop-title strong {
  overflow: hidden;
  font-size: 15px;
  font-weight: 950;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.stop-title em {
  flex: 0 0 auto;
  padding: 3px 7px;
  border-radius: 6px;
  background: var(--taupe);
  color: var(--coffee-deep);
  font-size: 11px;
  font-style: normal;
  font-weight: 900;
}

.stop-copy p {
  margin: 3px 0 0;
  color: var(--coffee);
  font-size: 12px;
  font-weight: 800;
  overflow-wrap: anywhere;
}

.map-box {
  display: grid;
  gap: 10px;
  align-content: start;
}

.map-box img {
  width: 100%;
  aspect-ratio: 1.28;
  border: 1.5px solid var(--line);
  border-radius: 8px;
  object-fit: cover;
}

.map-box a,
.outline-link {
  display: block;
  padding: 10px 12px;
  text-align: center;
  font-weight: 950;
}

.rate-line,
.list-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  color: var(--coffee-deep);
  font-size: 14px;
  font-weight: 900;
  margin-bottom: 10px;
}

.rate-line small,
.rate-drawer p span {
  display: block;
  margin-top: 2px;
  color: var(--coffee);
  font-size: 11px;
  font-weight: 900;
}

.money-display {
  border: 2px solid var(--line);
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 12px;
}

.money-display label {
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 58px;
  padding: 8px 14px;
  color: var(--coffee);
  font-size: 20px;
  font-weight: 950;
}

.money-display label + label {
  border-top: 1.5px solid var(--coffee-soft);
}

.money-display strong {
  color: var(--ink);
  font-size: clamp(26px, 3vw, 38px);
  line-height: 1;
}

.money-display label:last-child strong {
  color: #c96b28;
}

.calc-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 9px;
}

.calc-grid button,
.mini-keys button {
  min-height: 46px;
  border: 1.5px solid var(--line);
  border-radius: 8px;
  background: var(--cream);
  box-shadow: 3px 3px 0 rgba(157, 130, 101, 0.45);
  font-size: 24px;
  font-weight: 950;
  cursor: pointer;
}

.calc-grid button.equals,
.primary {
  border: 1.5px solid var(--yellow-deep);
  border-radius: 8px;
  background: var(--yellow);
  box-shadow: 4px 4px 0 var(--shadow);
  color: var(--ink);
  font-weight: 950;
  cursor: pointer;
}

.primary {
  padding: 11px 14px;
  font-size: 17px;
}

.check-list {
  display: grid;
  gap: 8px;
}

.check-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 10px;
  align-items: center;
  min-height: 24px;
  font-size: 15px;
  font-weight: 850;
}

.check-row label {
  display: flex;
  gap: 10px;
  align-items: center;
  min-width: 0;
  cursor: pointer;
}

.check-row span {
  overflow-wrap: anywhere;
}

.check-row input {
  width: 17px;
  height: 17px;
  accent-color: var(--coffee);
}

.row-actions {
  display: flex;
  gap: 6px;
  align-items: center;
  justify-content: flex-end;
  flex-wrap: wrap;
}

.row-actions button {
  min-height: 28px;
  border: 1.5px solid var(--line);
  border-radius: 7px;
  background: var(--cream);
  color: var(--coffee-deep);
  font-size: 12px;
  font-weight: 950;
  cursor: pointer;
}

.maps-content {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 168px;
  gap: 12px;
}

.place-list,
.route-panel {
  border: 1.5px solid var(--coffee-soft);
  border-radius: 8px;
  background: rgba(255, 250, 240, 0.7);
  padding: 11px;
}

.place-row,
.ledger-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 8px;
  align-items: center;
  padding: 5px 0;
  border-top: 1px dashed var(--coffee-soft);
  font-weight: 850;
}

.place-row span,
.ledger-row span {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.place-row em,
.ledger-row em {
  padding: 3px 8px;
  border-radius: 6px;
  background: var(--taupe);
  color: var(--coffee-deep);
  font-size: 12px;
  font-style: normal;
  font-weight: 900;
}

.ledger-row {
  grid-template-columns: minmax(0, 1fr) auto auto;
}

.place-row .row-actions,
.ledger-row .row-actions {
  grid-column: 1 / -1;
  justify-content: flex-start;
}

.route-panel {
  display: grid;
  gap: 8px;
  align-content: start;
}

.route-panel h3 {
  margin: 0;
  font-size: 20px;
  font-weight: 950;
}

.route-panel label {
  display: grid;
  gap: 6px;
  color: var(--coffee);
  font-size: 13px;
  font-weight: 900;
}

.route-panel select,
.modal input,
.modal textarea {
  width: 100%;
  border: 1.5px solid var(--line);
  border-radius: 8px;
  background: var(--cream);
  color: var(--ink);
  font-weight: 850;
}

.route-panel select,
.modal input {
  min-height: 38px;
  padding: 7px 9px;
}

.route-doodle {
  position: relative;
  height: 34px;
  border: 1.5px dashed var(--line);
  border-radius: 50%;
}

.route-doodle span {
  position: absolute;
  top: 12px;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--coffee);
}

.route-doodle span:first-child {
  left: 30px;
}

.route-doodle span:last-child {
  right: 30px;
}

.route-doodle i {
  position: absolute;
  left: 50%;
  top: 6px;
  width: 10px;
  height: 28px;
  border-radius: 8px;
  background: var(--yellow);
  transform: rotate(28deg);
}

.floating-rate,
.bottom-add {
  position: fixed;
  z-index: 5;
  cursor: pointer;
}

.floating-rate {
  right: 38px;
  bottom: 142px;
  width: 88px;
  height: 88px;
  border: 2px solid var(--line);
  border-radius: 50%;
  background: var(--taupe);
  box-shadow: 8px 8px 0 var(--shadow);
  font-size: 18px;
  font-weight: 950;
}

.bottom-add {
  left: 50%;
  bottom: 24px;
  width: min(680px, calc(100vw - 48px));
  height: 62px;
  border: 2px solid var(--yellow-deep);
  background: var(--yellow);
  transform: translateX(-50%);
  font-size: 28px;
  font-weight: 950;
}

.modal-backdrop {
  position: fixed;
  inset: 0;
  z-index: 10;
  display: grid;
  place-items: center;
  padding: 24px;
  background: rgba(90, 70, 56, 0.2);
}

.modal {
  position: relative;
  width: min(560px, 100%);
  padding: 24px;
}

.modal.compact {
  width: min(460px, 100%);
}

.modal h2,
.rate-drawer h2 {
  margin: 0 0 12px;
  font-size: 28px;
  font-weight: 950;
}

.modal p,
.rate-drawer p {
  margin: 0 0 14px;
  color: var(--coffee);
  font-weight: 850;
}

.modal textarea {
  min-height: 140px;
  padding: 12px;
  resize: vertical;
  margin-bottom: 14px;
}

.modal input {
  margin-bottom: 12px;
}

.form-row {
  display: grid;
  gap: 6px;
  margin-bottom: 12px;
  color: var(--coffee-deep);
  font-size: 13px;
  font-weight: 950;
}

.form-row input,
.form-row select,
.form-check {
  width: 100%;
  min-height: 44px;
  border: 1.5px solid var(--line);
  border-radius: 8px;
  background: var(--cream);
  color: var(--ink);
  font-weight: 850;
}

.form-row input,
.form-row select {
  padding: 8px 10px;
}

.form-check {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  margin-bottom: 14px;
}

.form-check input {
  width: 18px;
  height: 18px;
  margin: 0;
  accent-color: var(--coffee);
}

.modal-actions {
  display: grid;
  grid-template-columns: 0.8fr 1.2fr;
  gap: 10px;
}

.danger {
  min-height: 46px;
  border: 1.5px solid var(--rose);
  border-radius: 8px;
  background: #fff3ee;
  color: #8d4538;
  box-shadow: 4px 4px 0 var(--coffee-soft);
  font-weight: 950;
  cursor: pointer;
}

.modal-close {
  position: absolute;
  top: 12px;
  right: 12px;
  border: 1.5px solid var(--line);
  border-radius: 8px;
  background: var(--cream);
  padding: 7px 10px;
  font-size: 12px;
  font-weight: 900;
  cursor: pointer;
}

.wide {
  display: block;
  width: 100%;
  text-align: center;
}

.segmented {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin: 14px 0;
}

.segmented button {
  min-height: 40px;
  border: 1.5px solid var(--line);
  border-radius: 8px;
  background: var(--cream);
  font-weight: 950;
  cursor: pointer;
}

.segmented button.active {
  background: var(--yellow);
}

.rate-drawer {
  position: fixed;
  right: 34px;
  bottom: 244px;
  z-index: 9;
  width: 310px;
  padding: 24px;
}

.mini-result {
  display: grid;
  gap: 6px;
  padding: 14px;
  border: 1.5px solid var(--line);
  border-radius: 8px;
  margin-bottom: 12px;
}

.mini-result span {
  color: var(--coffee);
  font-size: 18px;
  font-weight: 950;
}

.mini-result strong {
  color: #c96b28;
  font-size: 34px;
  font-weight: 950;
}

.mini-keys {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.mini-keys button {
  min-height: 42px;
  font-size: 18px;
}

.empty-note {
  border: 1.5px dashed var(--line);
  border-radius: 8px;
  padding: 22px;
  color: var(--coffee);
  font-weight: 900;
}

@media (max-width: 1100px) {
  .app-shell {
    padding: 24px 20px 108px;
  }

  .side-nav {
    position: static;
    width: 100%;
    grid-template-columns: repeat(7, minmax(70px, 1fr));
    margin-bottom: 18px;
    overflow-x: auto;
  }

  .side-nav button {
    min-height: 46px;
  }

  .grid-board {
    grid-template-columns: 1fr 1fr;
  }

  .expense-card,
  .maps-card {
    grid-column: span 2;
  }
}

@media (max-width: 1300px) and (min-width: 1101px) {
  .app-shell {
    padding: 26px 18px 96px 104px;
  }

  .side-nav {
    left: 32px;
    width: 72px;
  }

  .workspace {
    width: min(900px, 100%);
    margin: 0;
  }

  .page-header h1 {
    font-size: 38px;
  }

  .outline-button {
    padding: 10px 12px;
  }

  .grid-board {
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) 300px;
    gap: 18px;
  }

  .card {
    padding: 18px;
  }

  .card-title h2 {
    font-size: 27px;
  }

  .itinerary-card,
  .expense-card {
    min-height: 430px;
  }

  .date-tab {
    min-width: 110px;
  }

  .itinerary-body {
    grid-template-columns: minmax(0, 1fr) 198px;
    gap: 14px;
  }

  .timeline-row {
    grid-template-columns: 54px 22px minmax(0, 1fr);
    gap: 9px;
  }

  .money-display strong {
    font-size: 28px;
  }

  .calc-grid button {
    min-height: 43px;
    font-size: 21px;
  }

  .maps-content {
    grid-template-columns: 1fr;
  }

  .place-row:nth-of-type(n + 7) {
    display: grid;
  }
}

@media (max-width: 760px) {
  html,
  body {
    overflow-x: hidden;
    max-width: 100%;
  }

  .app-shell {
    padding: 10px 10px 196px;
  }

  .doodle-layer {
    opacity: 0.5;
  }

  .workspace {
    width: 100%;
    margin: 0;
  }

  .page-header {
    align-items: start;
    flex-direction: column;
    gap: 7px;
    margin-bottom: 10px;
  }

  .page-header p {
    font-size: 12px;
  }

  .page-header h1 {
    font-size: 25px;
  }

  .page-header h1 span {
    display: block;
    margin: 2px 0 0;
    font-size: 18px;
  }

  .header-actions {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .outline-button {
    min-height: 38px;
    padding: 8px 9px;
    font-size: 13px;
  }

  .grid-board {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    width: 100%;
    min-width: 0;
    gap: 10px;
  }

  .itinerary-body,
  .maps-content {
    grid-template-columns: 1fr;
    width: 100%;
    min-width: 0;
  }

  .itinerary-card {
    grid-column: 1 / -1;
    order: 1;
  }

  .expense-card {
    grid-column: 1 / -1;
    order: 2;
  }

  .maps-card {
    grid-column: 1 / -1;
    order: 3;
  }

  .check-card {
    grid-column: span 1;
    order: 4;
  }

  .card {
    min-height: auto;
    padding: 11px;
    box-shadow: 5px 5px 0 var(--shadow);
  }

  .card.is-focused {
    outline-width: 3px;
    outline-offset: 2px;
    box-shadow: 6px 6px 0 var(--yellow-deep), 10px 10px 0 var(--shadow);
    transform: translate(-1px, -1px);
  }

  .card-title h2 {
    font-size: 17px;
    flex: 1 1 auto;
    min-width: 0;
    overflow-wrap: anywhere;
  }

  .card-title {
    align-items: center;
    flex-direction: row;
    gap: 7px;
    margin-bottom: 8px;
  }

  .card-title .ghost-button {
    width: auto;
    min-height: 30px;
    padding: 6px 8px;

function distance(a, b) {
  const dx = (a.lat - b.lat) * 111;
  const dy = (a.lng - b.lng) * 91;
  return Math.sqrt(dx * dx + dy * dy);
}

function formatTime(minutes) {
  const h = Math.floor(minutes / 60).toString().padStart(2, "0");
  const m = (minutes % 60).toString().padStart(2, "0");
  return `${h}:${m}`;
}

function routePlaces(seed, places) {
  const remaining = places.map((place) => ({ ...place }));
  const ordered = [];
  let cursor = seed;

  while (remaining.length) {
    remaining.sort((a, b) => distance(cursor, a) - distance(cursor, b));
    const next = remaining.shift();
    ordered.push(next);
    cursor = next;
  }

  return ordered;
}

function guessDay(place) {
  const text = `${place.name} ${place.area}`.toLowerCase();
  if (place.city === "京都") return "d2";
  if (/usj|環球|影城|此花/.test(text)) return "d3";
  if (/梅田|中之島|大阪城|天滿|藍天/.test(text)) return "d1";
  if (/難波|心齋|道頓|黑門|通天|新世界|天王寺|日本橋/.test(text)) return "d4";

  const osakaDays = state.days.filter((day) => day.city === "大阪");
  return osakaDays
    .map((day) => ({ id: day.id, dist: distance(day.seed, place) }))
    .sort((a, b) => a.dist - b.dist)[0].id;
}

function buildAutoItinerary(places) {
  const byDay = Object.fromEntries(state.days.map((day) => [day.id, []]));

  places.forEach((place) => {
    const dayId = place.day || guessDay(place);
    byDay[dayId].push(place);
  });

  const result = {};
  state.days.forEach((day) => {
    const ordered = routePlaces(day.seed, byDay[day.id]);
    let cursor = 9 * 60;
    result[day.id] = ordered.map((place, index) => {
      const travel = index === 0 ? 15 : Math.max(8, Math.round(distance(ordered[index - 1], place) * 7));
      cursor += index === 0 ? 0 : travel;
      const start = cursor;
      cursor += place.stay || 75;
      return {
        ...place,
        time: formatTime(start),
        travel,
      };
    });
  });

  return result;
}

state.itinerary = buildAutoItinerary(state.places);

function getCurrentDay() {
  return state.days.find((day) => day.id === state.activeDay);
}

function getCurrentStops() {
  return state.itinerary[state.activeDay] || [];
}

function twdFromYen(value) {
  const yen = Number(value || 0);
  return Math.round(yen * state.exchangeRate);
}

function formatRate(value = state.exchangeRate) {

}

function rateSourceText() {

function mapsUrl(stops = getCurrentStops()) {
  if (!stops.length) return "https://www.google.com/maps";
  const encoded = stops.map((stop) => encodeURIComponent(`${stop.name} ${stop.city}`));
  const origin = encoded[0];
  const destination = encoded[encoded.length - 1];
  const waypoints = encoded.slice(1, -1).join("%7C");
  return `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${destination}${
    waypoints ? `&waypoints=${waypoints}` : ""
  }&travelmode=walking`;
}

const scrollSelectors = [".date-tabs", ".timeline", ".check-list", ".place-list", ".ledger-list", ".modal"];

function captureScrollState() {
  return {
    x: window.scrollX,
    y: window.scrollY,
    elements: scrollSelectors.flatMap((selector) =>
      Array.from(document.querySelectorAll(selector)).map((element, index) => ({
        selector,
        index,
        left: element.scrollLeft,
        top: element.scrollTop,
      })),
    ),
  };
}

function syncActiveDateTab() {
  const activeTab = document.querySelector(".date-tab.active");
  const dateTabs = activeTab?.closest(".date-tabs");
  if (!activeTab || !dateTabs) return;

  const left = activeTab.offsetLeft;
  const right = left + activeTab.offsetWidth;
  const viewLeft = dateTabs.scrollLeft;
  const viewRight = viewLeft + dateTabs.clientWidth;

  if (left < viewLeft) {
    dateTabs.scrollLeft = Math.max(left - 6, 0);
  } else if (right > viewRight) {
    dateTabs.scrollLeft = right - dateTabs.clientWidth + 6;
  }
}

function restoreScrollState(snapshot, options = {}) {
  requestAnimationFrame(() => {
    snapshot.elements.forEach(({ selector, index, left, top }) => {
      const element = document.querySelectorAll(selector)[index];
      if (!element) return;
      element.scrollLeft = left;
      element.scrollTop = top;
    });

    window.scrollTo(snapshot.x, snapshot.y);
    if (options.syncDateTabs) syncActiveDateTab();
  });
}

function setState(patch, options = {}) {
  const previousState = state;
  const scrollSnapshot = options.preserveScroll === false ? null : captureScrollState();
  state = { ...state, ...patch };
  render();

  const shouldSyncDateTabs = patch.activeDay && patch.activeDay !== previousState.activeDay;
  if (scrollSnapshot) {
    restoreScrollState(scrollSnapshot, { syncDateTabs: shouldSyncDateTabs });
  } else if (shouldSyncDateTabs) {
    requestAnimationFrame(syncActiveDateTab);
  }
}

function focusSection(section) {
  setState({ activeSection: section });

  requestAnimationFrame(() => {
    if (section === "home") {
      window.scrollTo({ top: 0, behavior: "smooth" });
      return;
    }

    document
      .querySelector(`[data-section-card="${section}"]`)
      ?.scrollIntoView({ block: "center", behavior: "smooth" });
  });
}

function safe(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function fieldValue(key) {

}

function openEdit(type, id, kind = "") {
  if (type === "place") {
    const place = state.places.find((item) => item.id === id);

    setState({ modal: "edit", editing: { type, id }, editDraft: { ...place } });
    return;
  }

  if (type === "expense") {
    const entry = state.ledger.find((item) => item.id === id);
    if (!entry) return;
    setState({ modal: "edit", editing: { type, id }, editDraft: { ...entry } });
    return;
  }

  if (type === "check") {
    const item = state[kind]?.find((row) => row.id === id);
    if (!item) return;
    setState({ modal: "edit", editing: { type, id, kind }, editDraft: { ...item } });
    return;
  }

  if (type === "day") {

    if (!day) return;
    setState({ modal: "edit", editing: { type, id }, editDraft: { ...day } });
  }
}

function deleteItem(type, id, kind = "") {
  if (type === "place") {
    const places = state.places.filter((item) => item.id !== id);

    return;

  if (type === "expense") {

    return;
  }

  if (type === "check") {
    setState({ [kind]: state[kind].filter((item) => item.id !== id), modal: null });
  }
}

function saveEdit() {
  const editing = state.editing;
  if (!editing) return;
  const draft = state.editDraft;

  if (editing.type === "trip") {
    setState({
      tripTitle: draft.tripTitle?.trim() || state.tripTitle,
      tripDates: draft.tripDates?.trim() || state.tripDates,
      exchangeRate: Number(draft.exchangeRate) || state.exchangeRate,

        Number(draft.exchangeRate) && Number(draft.exchangeRate) !== state.exchangeRate

          : state.rateMeta,
      modal: null,
      editing: null,
      editDraft: {},
    });
    return;
  }

  if (editing.type === "day") {
    const days = state.days.map((day) =>
      day.id === editing.id
        ? {
            ...day,
            label: draft.label?.trim() || day.label,

            weekday: draft.weekday?.trim() || day.weekday,
            city: draft.city?.trim() || day.city,
          }
        : day,
    );
    setState({ days, itinerary: buildAutoItinerary(state.places), modal: null, editing: null, editDraft: {} });
    return;
  }

  if (editing.type === "place") {
    const places = state.places.map((place) =>
      place.id === editing.id
        ? {
            ...place,
            name: draft.name?.trim() || place.name,
            city: draft.city?.trim() || place.city,
            area: draft.area?.trim() || place.area,
            tag: draft.tag?.trim() || place.tag,
            day: draft.day || place.day,

          }
        : place,
    );
    setState({ places, itinerary: buildAutoItinerary(places), modal: null, editing: null, editDraft: {} });
    return;
  }

  if (editing.type === "expense") {
    const ledger = state.ledger.map((entry) =>
      entry.id === editing.id
        ? {
            ...entry,
            title: draft.title?.trim() || entry.title,
            yen: Number(draft.yen) || entry.yen,
            twd: twdFromYen(Number(draft.yen) || entry.yen),
            day: draft.day?.trim() || entry.day,
          }
        : entry,
    );
    setState({ ledger, modal: "ledger", editing: null, editDraft: {} });
    return;
  }

  if (editing.type === "check") {
    const kind = editing.kind;
    const rows = state[kind].map((item) =>
      item.id === editing.id
        ? {
            ...item,
            label: draft.label?.trim() || item.label,
            done: Boolean(draft.done),
          }
        : item,
    );
    setState({ [kind]: rows, modal: null, editing: null, editDraft: {} });
  }
}

function handleCalc(key) {
  if (key === "back") {
    setState({ yenInput: state.yenInput.slice(0, -1) || "0" });
    return;
  }
  if (key === "clear") {
    setState({ yenInput: "0" });
    return;
  }
  if (key === "=") {
    const yen = Number(state.yenInput || 0);
    if (!yen) return;
    const entry = {
      id: `e${Date.now()}`,
      title: `${getCurrentDay().label} 消費`,
      yen,
      twd: twdFromYen(yen),
      day: getCurrentDay().label.split(" ")[0],
    };
    setState({ ledger: [entry, ...state.ledger], modal: "ledger" });
    return;
  }
  if (["+", "-"].includes(key)) return;

  const next = state.yenInput === "0" && key !== "." ? key : `${state.yenInput}${key}`;
  if (/^\d{0,8}(\.\d{0,2})?$/.test(next)) setState({ yenInput: next });
}

function toggleChecklist(kind, id) {
  const items = state[kind].map((item) => (item.id === id ? { ...item, done: !item.done } : item));
  setState({ [kind]: items });
}

function parseImport(text) {
  return text
    .split("\n")
    .map((line) => line.trim())
    .filter(Boolean)
    .map((line, index) => {
      const [name, cityRaw, areaRaw, stayRaw] = line.split(",").map((part) => part?.trim());
      const cityText = cityRaw || "";
      const city = /京都|kyoto/i.test(cityText) ? "京都" : "大阪";
      const base = city === "京都" ? { lat: 35.0116, lng: 135.7681 } : { lat: 34.6937, lng: 135.5023 };
      return {
        id: `i${Date.now()}${index}`,
        name: name || `匯入景點 ${index + 1}`,
        city,
        area: areaRaw || city,
        lat: base.lat + (index % 4) * 0.01 - 0.015,
        lng: base.lng + (index % 5) * 0.012 - 0.018,
        stay: Number(stayRaw) || 75,
        tag: "匯入",
      };
    });
}

function importPlaces() {
  const imported = parseImport(state.importText);
  if (!imported.length) return;
  const places = [...state.places, ...imported];
  setState({

    itinerary: buildAutoItinerary(places),
    importText: "",
    modal: null,
    activeSection: "maps",

}

function autoArrange() {

  });
}

function addItem() {
  const name = state.addName.trim();
  if (!name) return;

  if (state.addKind === "spot") {
    const day = getCurrentDay();
    const place = {
      id: `n${Date.now()}`,
      name,
      city: day.city,
      area: state.addDetail.trim() || day.city,
      lat: day.seed.lat + Math.random() * 0.03 - 0.015,
      lng: day.seed.lng + Math.random() * 0.03 - 0.015,
      stay: 75,
      tag: "新增",
      day: day.id,
    };
    const places = [...state.places, place];
    setState({
      places,
      itinerary: buildAutoItinerary(places),
      addName: "",
      addDetail: "",
      modal: null,
      activeSection: "maps",
    });
    return;
  }

  if (state.addKind === "expense") {
    const yen = Number(state.addDetail) || Number(state.yenInput) || 0;
    if (!yen) return;
    const entry = {
      id: `e${Date.now()}`,
      title: name,
      yen,
      twd: twdFromYen(yen),
      day: getCurrentDay().label.split(" ")[0],
    };
    setState({ ledger: [entry, ...state.ledger], addName: "", addDetail: "", modal: null });
    return;
  }

  const key = state.addKind === "packing" ? "packing" : "souvenirs";
  setState({
    [key]: [...state[key], { id: `c${Date.now()}`, label: name, done: false }],
    addName: "",
    addDetail: "",
    modal: null,
  });
}

document.addEventListener("click", (event) => {
  const target = event.target.closest("[data-action]");
  if (!target) return;

  const action = target.dataset.action;
  if (action === "section") {
    if (target.dataset.section === "settings") {
      openTripSettings();
    } else {
      focusSection(target.dataset.section);
    }
  }
  if (action === "day") setState({ activeDay: target.dataset.day, activeSection: "itinerary" });
  if (action === "selectDay") return;
  if (action === "calc") handleCalc(target.dataset.key);
  if (action === "toggle") toggleChecklist(target.dataset.kind, target.dataset.id);
  if (action === "openImport") setState({ modal: "import", activeSection: "maps" });
  if (action === "importPlaces") importPlaces();
  if (action === "autoArrange") autoArrange();
  if (action === "openTripSettings") openTripSettings();
  if (action === "openLedger") setState({ modal: "ledger", activeSection: "expense" });
  if (action === "openAdd") setState({ modal: "add" });
  if (action === "addKind") setState({ addKind: target.dataset.kind });
  if (action === "addItem") addItem();
  if (action === "edit") openEdit(target.dataset.type, target.dataset.id, target.dataset.kind);
  if (action === "delete") deleteItem(target.dataset.type, target.dataset.id, target.dataset.kind);
  if (action === "saveEdit") saveEdit();
  if (action === "toggleDrawer") setState({ drawerOpen: !state.drawerOpen });
  if (action === "closeModal" && event.target === target) setState({ modal: null });
});

document.addEventListener("change", (event) => {
  const select = event.target.closest("select[data-action='selectDay']");
  if (select) setState({ activeDay: select.value, activeSection: "maps" });

  const editField = event.target.closest("[data-edit-field]");
  if (editField) {
    const value = editField.type === "checkbox" ? editField.checked : editField.value;
    state.editDraft = { ...state.editDraft, [editField.dataset.editField]: value };
  }
});

document.addEventListener("input", (event) => {
  if (event.target.id === "importText") state.importText = event.target.value;
  if (event.target.id === "addName") state.addName = event.target.value;
  if (event.target.id === "addDetail") state.addDetail = event.target.value;
  const editField = event.target.closest("[data-edit-field]");
  if (editField) {
    state.editDraft = { ...state.editDraft, [editField.dataset.editField]: editField.value };
  }
});

render();
requestAnimationFrame(syncActiveDateTab);
</script>
  </body>
</html>
