<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="6/22-6/25 大阪與京都旅遊規劃、記帳、行李、購物清單、必吃清單、備註與 Google Maps 收藏順路排程 App"
    />
    <meta name="travel-planner-version" content="20260619-edit-itinerary-time-v1" />
    <title>大阪・京都 6/22-6/25 旅遊規劃</title>
    <style>:root {
  --ivory: #f7f3f8;
  --cream: #ffffff;
  --coffee: #6e6472;
  --coffee-deep: #27303f;
  --coffee-soft: rgba(95, 92, 112, 0.2);
  --taupe: rgba(255, 255, 255, 0.6);
  --taupe-strong: rgba(225, 219, 232, 0.76);
  --accent: #d8bfdc;
  --accent-deep: #9c7ca6;
  --aqua: #6f86b7;
  --aqua-soft: #eef0f7;
  --panel: rgba(255, 255, 255, 0.68);
  --panel-strong: rgba(255, 255, 255, 0.9);
  --rose: #b87892;
  --ink: #27303f;
  --shadow: rgba(58, 59, 82, 0.2);
  --line: rgba(80, 82, 112, 0.28);
  font-family: "PingFang TC", "PingFang SC", "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-width: 320px;
  min-height: 100vh;
  color: var(--ink);
  background:
    radial-gradient(circle at 12% 8%, rgba(184, 120, 146, 0.18), transparent 30%),
    radial-gradient(circle at 88% 16%, rgba(111, 134, 183, 0.2), transparent 28%),
    radial-gradient(circle at 50% 92%, rgba(156, 124, 166, 0.16), transparent 32%),
    linear-gradient(135deg, rgba(255, 255, 255, 0.92), rgba(239, 235, 244, 0.86)),
    repeating-linear-gradient(0deg, rgba(39, 48, 63, 0.035) 0 1px, transparent 1px 28px),
    repeating-linear-gradient(90deg, rgba(39, 48, 63, 0.028) 0 1px, transparent 1px 28px),
    var(--ivory);
  background-attachment: fixed;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

button,
input,
textarea,
select {
  font: inherit;
}

button,
a {
  -webkit-tap-highlight-color: transparent;
}

button {
  color: inherit;
}

a {
  color: inherit;
  text-decoration: none;
}

.app-shell {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  padding: 30px 42px 96px 136px;
}

.sticker {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 8px;
  box-shadow: 0 18px 42px rgba(45, 70, 86, 0.12), 0 4px 0 rgba(111, 134, 183, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(22px) saturate(1.25);
}

.side-nav {
  position: fixed;
  top: 92px;
  left: 42px;
  width: 76px;
  padding: 10px 8px;
  display: grid;
  gap: 10px;
  background: rgba(255, 255, 255, 0.58);
}

.side-nav button {
  min-height: 58px;
  border: 1px solid transparent;
  border-radius: 8px;
  background: transparent;
  font-size: 13px;
  font-weight: 800;
  cursor: pointer;
}

.side-nav button:hover,
.side-nav button.active {
  background: linear-gradient(135deg, rgba(216, 191, 220, 0.92), rgba(111, 134, 183, 0.22));
  border-color: rgba(111, 134, 183, 0.72);
  box-shadow: 0 9px 22px rgba(111, 134, 183, 0.2);
}

.side-nav button.active {
  color: var(--coffee-deep);
  transform: none;
  box-shadow: inset 0 0 0 1px rgba(216, 191, 220, 0.95), 0 10px 24px rgba(111, 134, 183, 0.22);
}

.workspace {
  width: min(1280px, 100%);
  margin: 0 auto;
  min-width: 0;
}

.page-header {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 24px;
  margin-bottom: 16px;
}

.header-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.page-header p {
  margin: 0 0 4px;
  color: var(--coffee);
  font-size: 14px;
  font-weight: 900;
  letter-spacing: 0;
}

.page-header h1 {
  margin: 0;
  font-size: clamp(30px, 3.8vw, 42px);
  line-height: 1.05;
  font-weight: 950;
  letter-spacing: 0;
  text-shadow: 0 10px 28px rgba(111, 134, 183, 0.18);
}

.page-header h1 span {
  display: inline-block;
  margin-left: 8px;
}

.outline-button,
.ghost-button,
.outline-link,
.link-button {
  border: 1.5px solid var(--line);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.72);
  font-weight: 900;
  cursor: pointer;
  backdrop-filter: blur(16px);
}

.outline-button {
  padding: 12px 16px;
  box-shadow: 0 10px 22px rgba(111, 134, 183, 0.16);
}

.grid-board {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) minmax(390px, 1.08fr);
  grid-template-areas:
    "itinerary itinerary expense"
    "packing shopping maps"
    "food notes maps";
  gap: 20px;
  align-items: stretch;
  min-width: 0;
}

.card {
  padding: 20px;
  min-height: 246px;
  min-width: 0;
  position: relative;
  overflow: hidden;
}

.card.is-focused {
  outline: 2px solid rgba(111, 134, 183, 0.9);
  outline-offset: 3px;
  box-shadow: 0 22px 48px rgba(111, 134, 183, 0.22), inset 0 0 0 1px rgba(216, 191, 220, 0.5);
  transform: translateY(-1px);
}

.itinerary-card {
  grid-area: itinerary;
  min-height: 430px;
}

.expense-card {
  grid-area: expense;
  min-height: 430px;
}

.maps-card {
  grid-area: maps;
}

[data-section-card="packing"] {
  grid-area: packing;
}

[data-section-card="souvenir"] {
  grid-area: shopping;
}

.food-card {
  grid-area: food;
}

.notes-card {
  grid-area: notes;
}

.card-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 14px;
}

.card-title h2 {
  margin: 0;
  font-size: 28px;
  line-height: 1;
  font-weight: 950;
}

.card-title span,
.doodle-chip {
  color: var(--coffee);
  font-size: 13px;
  font-weight: 900;
}

.ghost-button {
  padding: 8px 10px;
  color: var(--coffee-deep);
  box-shadow: 0 7px 16px rgba(34, 48, 57, 0.06);
}

.date-tabs {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  width: 100%;
  max-width: 100%;
  min-width: 0;
  padding: 2px 4px 12px;
  scrollbar-width: thin;
}

.date-tab {
  min-width: 132px;
  padding: 10px 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.66);
  cursor: pointer;
  box-shadow: 0 8px 20px rgba(45, 70, 86, 0.08);
  backdrop-filter: blur(14px);
}

.date-tab strong,
.date-tab span {
  display: block;
}

.date-tab strong {
  font-size: 15px;
  font-weight: 950;
}

.date-tab span {
  color: var(--coffee);
  font-size: 12px;
  font-weight: 800;
}

.date-tab.active {
  background: linear-gradient(135deg, rgba(216, 191, 220, 0.96), rgba(238, 240, 247, 0.98));
  border-color: rgba(111, 134, 183, 0.72);
  box-shadow: 0 12px 24px rgba(111, 134, 183, 0.2);
}

.itinerary-body {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(220px, 0.46fr);
  gap: 18px;
  align-items: stretch;
  margin-top: 8px;
  min-width: 0;
}

.timeline {
  min-height: 300px;
  min-width: 0;
}

.timeline-row {
  display: grid;
  grid-template-columns: 58px 24px minmax(0, 1fr);
  gap: 12px;
  align-items: start;
  min-height: 47px;
}

.time {
  padding-top: 2px;
  font-size: 17px;
  font-weight: 950;
}

.rail {
  position: relative;
  min-height: 50px;
}

.rail::before {
  content: "";
  position: absolute;
  left: 10px;
  top: 17px;
  bottom: -10px;
  width: 2px;
  background: var(--coffee-soft);
}

.timeline-row:last-child .rail::before {
  display: none;
}

.rail span {
  display: block;
  width: 14px;
  height: 14px;
  margin: 5px 0 0 4px;
  border: 2px solid var(--coffee);
  border-radius: 50%;
  background: var(--taupe);
}

.stop-title {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
}

.stop-title strong {
  overflow: hidden;
  font-size: 15px;
  font-weight: 950;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.stop-title em {
  flex: 0 0 auto;
  padding: 3px 7px;
  border-radius: 6px;
  background: var(--taupe);
  color: var(--coffee-deep);
  font-size: 11px;
  font-style: normal;
  font-weight: 900;
}

.stop-copy p {
  margin: 3px 0 0;
  color: var(--coffee);
  font-size: 12px;
  font-weight: 800;
  overflow-wrap: anywhere;
}

.map-box {
  display: grid;
  gap: 10px;
  align-content: start;
}

.map-preview {
  position: relative;
  width: 100%;
  aspect-ratio: 1.28;
  overflow: hidden;
  border: 1.5px solid var(--line);
  border-radius: 8px;
  background:
    radial-gradient(circle at 28% 30%, rgba(216, 191, 220, 0.86) 0 8px, transparent 9px),
    radial-gradient(circle at 64% 52%, rgba(111, 134, 183, 0.72) 0 7px, transparent 8px),
    radial-gradient(circle at 42% 76%, rgba(184, 120, 146, 0.66) 0 6px, transparent 7px),
    linear-gradient(135deg, rgba(255, 255, 255, 0.84), rgba(238, 240, 247, 0.72)),
    repeating-linear-gradient(0deg, rgba(39, 48, 63, 0.055) 0 1px, transparent 1px 18px),
    repeating-linear-gradient(90deg, rgba(39, 48, 63, 0.045) 0 1px, transparent 1px 18px);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.88);
}

.map-preview::before {
  content: "";
  position: absolute;
  inset: 22% 18% 18% 22%;
  border-top: 3px solid rgba(111, 134, 183, 0.66);
  border-right: 3px solid rgba(111, 134, 183, 0.48);
  border-radius: 48% 34% 42% 28%;
  transform: rotate(18deg);
}

.map-preview::after {
  content: "ROUTE";
  position: absolute;
  right: 12px;
  bottom: 10px;
  padding: 4px 8px;
  border: 1px solid rgba(80, 82, 112, 0.22);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.68);
  color: var(--coffee);
  font-size: 10px;
  font-weight: 950;
}

.map-box a,
.outline-link {
  display: block;
  padding: 10px 12px;
  text-align: center;
  font-weight: 950;
}

.rate-line,
.list-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  color: var(--coffee-deep);
  font-size: 14px;
  font-weight: 900;
  margin-bottom: 10px;
}

.rate-line small,
.rate-drawer p span {
  display: block;
  margin-top: 2px;
  color: var(--coffee);
  font-size: 11px;
  font-weight: 900;
}

.money-display {
  border: 1px solid var(--line);
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 12px;
  background: rgba(255, 255, 255, 0.5);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.78);
}

.money-display label {
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 58px;
  padding: 8px 14px;
  color: var(--coffee);
  font-size: 20px;
  font-weight: 950;
}

.money-display label + label {
  border-top: 1.5px solid var(--coffee-soft);
}

.money-display strong {
  color: var(--ink);
  font-size: clamp(26px, 3vw, 38px);
  line-height: 1;
}

.money-display label:last-child strong {
  color: #9f647e;
}

.calc-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 9px;
}

.calc-grid button,
.mini-keys button {
  min-height: 46px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(238, 240, 247, 0.8));
  box-shadow: 0 9px 18px rgba(45, 70, 86, 0.1);
  font-size: 24px;
  font-weight: 950;
  cursor: pointer;
}

.calc-grid button.equals,
.primary {
  border: 1px solid rgba(156, 124, 166, 0.62);
  border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), rgba(111, 134, 183, 0.22));
  box-shadow: 0 12px 24px rgba(111, 134, 183, 0.18);
  color: var(--ink);
  font-weight: 950;
  cursor: pointer;
}

.primary {
  padding: 11px 14px;
  font-size: 17px;
}

.primary:disabled {
  cursor: progress;
  opacity: 0.64;
}

.expense-tools {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(120px, 0.7fr);
  gap: 10px;
  align-items: end;
  margin-bottom: 10px;
  color: var(--coffee-deep);
  font-size: 12px;
  font-weight: 950;
}

.expense-tools label {
  display: grid;
  gap: 5px;
}

.expense-tools select,
.currency-toggle button {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.68);
  color: var(--ink);
  font-weight: 950;
}

.expense-tools select {
  min-height: 34px;
  padding: 6px 8px;
}

.currency-toggle {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-top: 5px;
}

.currency-toggle button {
  min-height: 34px;
  cursor: pointer;
}

.currency-toggle button.active,
.route-mode button.active {
  background: var(--aqua-soft);
  border-color: rgba(111, 134, 183, 0.72);
  box-shadow: 0 8px 18px rgba(111, 134, 183, 0.18), inset 0 0 0 1px rgba(216, 191, 220, 0.5);
}

.expense-total {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 10px 12px;
  border: 1px solid rgba(111, 134, 183, 0.36);
  border-radius: 8px;
  background: rgba(238, 240, 247, 0.72);
  box-shadow: 0 8px 18px rgba(111, 134, 183, 0.12);
  margin-bottom: 10px;
  font-weight: 950;
}

.expense-total span {
  color: var(--coffee);
  font-size: 12px;
}

.expense-total strong {
  font-size: 22px;
}

.check-list {
  display: grid;
  gap: 8px;
}

.notes-list {
  display: grid;
  gap: 9px;
  max-height: 310px;
  overflow-y: auto;
  padding-right: 2px;
}

.note-row {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr) auto;
  gap: 10px;
  align-items: center;
  padding: 10px;
  border: 1px solid rgba(82, 111, 128, 0.18);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.54);
}

.note-copy {
  min-width: 0;
}

.note-copy strong,
.note-copy p {
  display: block;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.note-copy strong {
  font-size: 14px;
  font-weight: 950;
}

.note-copy p {
  margin: 3px 0 0;
  color: var(--coffee);
  font-size: 12px;
  font-weight: 850;
}

.check-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 10px;
  align-items: center;
  min-height: 24px;
  font-size: 15px;
  font-weight: 850;
}

.check-row label {
  display: flex;
  gap: 10px;
  align-items: center;
  min-width: 0;
  cursor: pointer;
}

.check-row.has-image {
  grid-template-columns: minmax(0, 1fr);
  align-items: start;
}

.check-row span {
  overflow-wrap: anywhere;
}

.check-row input {
  width: 17px;
  height: 17px;
  accent-color: var(--coffee);
}

.item-thumb {
  flex: 0 0 auto;
  width: 42px;
  height: 42px;
  border: 1px solid var(--line);
  border-radius: 8px;
  object-fit: cover;
  box-shadow: 0 8px 18px rgba(45, 70, 86, 0.12);
}

.row-actions {
  display: flex;
  gap: 6px;
  align-items: center;
  justify-content: flex-end;
  flex-wrap: wrap;
}

.row-actions button {
  min-height: 28px;
  border: 1px solid var(--line);
  border-radius: 10px;
  background: rgba(255, 255, 255, 0.68);
  color: var(--coffee-deep);
  font-size: 12px;
  font-weight: 950;
  cursor: pointer;
}

.maps-content {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 168px;
  gap: 12px;
}

.place-list,
.route-panel {
  border: 1px solid var(--coffee-soft);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.5);
  padding: 11px;
}

.place-row,
.ledger-row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 8px;
  align-items: center;
  padding: 5px 0;
  border-top: 1px dashed var(--coffee-soft);
  font-weight: 850;
}

.place-row span,
.ledger-row span {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.place-row em,
.ledger-row em {
  padding: 3px 8px;
  border-radius: 999px;
  background: rgba(238, 240, 247, 0.88);
  color: var(--coffee-deep);
  font-size: 12px;
  font-style: normal;
  font-weight: 900;
}

.ledger-row {
  grid-template-columns: minmax(0, 1fr) auto auto;
}

.place-row .row-actions,
.ledger-row .row-actions {
  grid-column: 1 / -1;
  justify-content: flex-start;
}

.route-panel {
  display: grid;
  gap: 8px;
  align-content: start;
}

.route-mode {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.route-mode button {
  min-height: 34px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.68);
  color: var(--ink);
  font-size: 12px;
  font-weight: 950;
  cursor: pointer;
}

.route-hint {
  margin: 0;
  color: var(--coffee);
  font-size: 12px;
  font-weight: 850;
  line-height: 1.35;
}

.route-panel h3 {
  margin: 0;
  font-size: 20px;
  font-weight: 950;
}

.route-panel label {
  display: grid;
  gap: 6px;
  color: var(--coffee);
  font-size: 13px;
  font-weight: 900;
}

.route-panel select,
.modal input,
.modal textarea,
.modal select {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.72);
  color: var(--ink);
  font-weight: 850;
}

.route-panel select,
.modal input,
.modal select {
  min-height: 38px;
  padding: 7px 9px;
}

.route-doodle {
  position: relative;
  height: 34px;
  border: 1.5px dashed var(--line);
  border-radius: 50%;
}

.route-doodle span {
  position: absolute;
  top: 12px;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--coffee);
}

.route-doodle span:first-child {
  left: 30px;
}

.route-doodle span:last-child {
  right: 30px;
}

.route-doodle i {
  position: absolute;
  left: 50%;
  top: 6px;
  width: 10px;
  height: 28px;
  border-radius: 8px;
  background: var(--accent);
  transform: rotate(28deg);
}

.floating-rate,
.bottom-add {
  position: fixed;
  z-index: 5;
  cursor: pointer;
}

.floating-rate {
  right: 38px;
  bottom: 142px;
  width: 88px;
  height: 88px;
  border: 1px solid rgba(111, 134, 183, 0.44);
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.7);
  box-shadow: 0 18px 36px rgba(111, 134, 183, 0.2), inset 0 0 0 1px rgba(255, 255, 255, 0.8);
  backdrop-filter: blur(18px);
  font-size: 18px;
  font-weight: 950;
}

.bottom-add {
  left: 50%;
  bottom: 24px;
  width: min(680px, calc(100vw - 48px));
  height: 62px;
  border: 1px solid rgba(156, 124, 166, 0.58);
  background: linear-gradient(135deg, rgba(216, 191, 220, 0.96), rgba(255, 255, 255, 0.72));
  transform: translateX(-50%);
  font-size: 28px;
  font-weight: 950;
}

.modal-backdrop {
  position: fixed;
  inset: 0;
  z-index: 10;
  display: grid;
  place-items: center;
  padding: 24px;
  background: rgba(34, 48, 57, 0.22);
  backdrop-filter: blur(8px);
}

.modal {
  position: relative;
  width: min(560px, 100%);
  padding: 24px;
}

.modal.compact {
  width: min(460px, 100%);
}

.modal h2,
.rate-drawer h2 {
  margin: 0 0 12px;
  font-size: 28px;
  font-weight: 950;
}

.modal p,
.rate-drawer p {
  margin: 0 0 14px;

function distance(a, b) {
  const dx = (a.lat - b.lat) * 111;
  const dy = (a.lng - b.lng) * 91;
  return Math.sqrt(dx * dx + dy * dy);
}

function formatTime(minutes) {
  const h = Math.floor(minutes / 60).toString().padStart(2, "0");
  const m = (minutes % 60).toString().padStart(2, "0");
  return `${h}:${m}`;
}

function routePlaces(seed, places) {
  const remaining = places.map((place) => ({ ...place }));
  const ordered = [];
  let cursor = seed;

  while (remaining.length) {
    remaining.sort((a, b) => distance(cursor, a) - distance(cursor, b));
    const next = remaining.shift();
    ordered.push(next);
    cursor = next;
  }

  return ordered;
}

function guessDay(place) {
  const text = `${place.name} ${place.area}`.toLowerCase();
  if (place.city === "京都") return "d2";
  if (/usj|環球|影城|此花/.test(text)) return "d3";
  if (/梅田|中之島|大阪城|天滿|藍天/.test(text)) return "d1";
  if (/難波|心齋|道頓|黑門|通天|新世界|天王寺|日本橋/.test(text)) return "d4";

  const osakaDays = state.days.filter((day) => day.city === "大阪");
  return osakaDays
    .map((day) => ({ id: day.id, dist: distance(day.seed, place) }))
    .sort((a, b) => a.dist - b.dist)[0].id;
}

function buildAutoItinerary(places) {
  const byDay = Object.fromEntries(state.days.map((day) => [day.id, []]));

  places.forEach((place) => {
    const dayId = place.day || guessDay(place);
    byDay[dayId].push(place);
  });

  const result = {};
  state.days.forEach((day) => {
    const ordered = routePlaces(day.seed, byDay[day.id]);
    let cursor = 9 * 60;
    result[day.id] = ordered.map((place, index) => {
      const travel = index === 0 ? 15 : Math.max(8, Math.round(distance(ordered[index - 1], place) * 7));
      cursor += index === 0 ? 0 : travel;
      const start = cursor;
      cursor += place.stay || 75;
      return {
        ...place,
        time: formatTime(start),
        travel,
      };
    });
  });

  return result;
}

function twdFromYen(value) {

function yenFromTwd(value) {

function normalizeExpense(entry) {
  const currency = entry.currency === "TWD" ? "TWD" : "JPY";
  const amount = Number(entry.amount ?? (currency === "TWD" ? entry.twd : entry.yen) ?? 0);
  const yen = currency === "JPY" ? amount : yenFromTwd(amount);
  const twd = currency === "TWD" ? amount : twdFromYen(amount);

  return {
    ...entry,
    amount,
    currency,
    yen: Math.round(Number(entry.yen ?? yen)),
    twd: Math.round(Number(entry.twd ?? twd)),
  };
}

    state = previousState;

function mapsUrl(stops = getCurrentStops()) {
  if (!stops.length) return "https://www.google.com/maps";
  const encoded = stops.map((stop) => encodeURIComponent(`${stop.name} ${stop.city}`));
  const origin = encoded[0];
  const destination = encoded[encoded.length - 1];
  const waypoints = encoded.slice(1, -1).join("%7C");
  return `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${destination}${
    waypoints ? `&waypoints=${waypoints}` : ""
  }&travelmode=walking`;
}

const scrollSelectors = [".date-tabs", ".timeline", ".check-list", ".place-list", ".notes-list", ".ledger-list", ".modal"];

function captureScrollState() {
  return {
    x: window.scrollX,
    y: window.scrollY,
    elements: scrollSelectors.flatMap((selector) =>
      Array.from(document.querySelectorAll(selector)).map((element, index) => ({
        selector,
        index,
        left: element.scrollLeft,
        top: element.scrollTop,
      })),
    ),
  };
}

function syncActiveDateTab() {
  const activeTab = document.querySelector(".date-tab.active");
  const dateTabs = activeTab?.closest(".date-tabs");
  if (!activeTab || !dateTabs) return;

  const left = activeTab.offsetLeft;
  const right = left + activeTab.offsetWidth;
  const viewLeft = dateTabs.scrollLeft;
  const viewRight = viewLeft + dateTabs.clientWidth;

  if (left < viewLeft) {
    dateTabs.scrollLeft = Math.max(left - 6, 0);
  } else if (right > viewRight) {
    dateTabs.scrollLeft = right - dateTabs.clientWidth + 6;
  }
}

function restoreScrollState(snapshot, options = {}) {
  requestAnimationFrame(() => {
    snapshot.elements.forEach(({ selector, index, left, top }) => {
      const element = document.querySelectorAll(selector)[index];
      if (!element) return;
      element.scrollLeft = left;
      element.scrollTop = top;
    });

    window.scrollTo(snapshot.x, snapshot.y);
    if (options.syncDateTabs) syncActiveDateTab();
  });
}

function setState(patch, options = {}) {
  const previousState = state;
  const scrollSnapshot = options.preserveScroll === false ? null : captureScrollState();
  state = { ...state, ...patch };
  saveState();
  render();

  const shouldSyncDateTabs = patch.activeDay && patch.activeDay !== previousState.activeDay;
  if (scrollSnapshot) {
    restoreScrollState(scrollSnapshot, { syncDateTabs: shouldSyncDateTabs });
  } else if (shouldSyncDateTabs) {
    requestAnimationFrame(syncActiveDateTab);
  }
}

function safe(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function minutesFromTime(value) {
  const match = String(value || "").match(/^(\d{1,2}):(\d{2})$/);
  if (!match) return 24 * 60;
  return Number(match[1]) * 60 + Number(match[2]);
}

function normalizeTimeInput(value, fallback = "09:00") {
  const text = String(value || "").trim();
  const match = text.match(/^(\d{1,2})(?::?(\d{2}))?$/);
  if (!match) return fallback;

  const hours = Number(match[1]);
  const minutes = Number(match[2] || 0);
  if (hours < 0 || hours > 23 || minutes < 0 || minutes > 59) return fallback;
  return `${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}`;
}

function findItineraryStop(id) {
  for (const [dayId, stops] of Object.entries(state.itinerary)) {
    const stop = stops.find((item) => item.id === id);
    if (stop) return { dayId, stop };
  }

  return null;
}

function updateManualItineraryStop(updatedPlace, time) {
  const existing = findItineraryStop(updatedPlace.id);
  const nextDayId = updatedPlace.day || existing?.dayId || state.activeDay;
  const nextItinerary = Object.fromEntries(
    state.days.map((day) => [
      day.id,
      (state.itinerary[day.id] || []).filter((stop) => stop.id !== updatedPlace.id),
    ]),
  );

  const nextStop = {
    ...(existing?.stop || {}),
    ...updatedPlace,
    time: normalizeTimeInput(time, existing?.stop?.time || "09:00"),
    travel: existing?.stop?.travel || 15,
  };

  nextItinerary[nextDayId] = [...(nextItinerary[nextDayId] || []), nextStop].sort(
    (a, b) => minutesFromTime(a.time) - minutesFromTime(b.time),
  );

  return { itinerary: nextItinerary, activeDay: nextDayId };
}

function openEdit(type, id, kind = "") {
  if (type === "place") {
    const place = state.places.find((item) => item.id === id);
    if (!place) return;
    const scheduled = findItineraryStop(id);
    setState({
      modal: "edit",
      editing: { type, id },
      editDraft: {
        ...place,
        day: place.day || scheduled?.dayId || state.activeDay,
        time: scheduled?.stop?.time || "09:00",
      },
    });
    return;
  }

  if (type === "expense") {
    const entry = state.ledger.find((item) => item.id === id);
    if (!entry) return;
    setState({ modal: "edit", editing: { type, id }, editDraft: { ...normalizeExpense(entry) } });
    return;
  }

  if (type === "check") {
    const item = state[kind]?.find((row) => row.id === id);
    if (!item) return;
    setState({ modal: "edit", editing: { type, id, kind }, editDraft: { ...item } });
    return;
  }

  if (type === "note") {
    const note = state.notes.find((item) => item.id === id);
    if (!note) return;
    setState({ modal: "edit", editing: { type, id }, editDraft: { ...note } });
    return;
  }

  if (type === "day") {
    const day = state.days.find((item) => item.id === id);
    if (!day) return;
    setState({ modal: "edit", editing: { type, id }, editDraft: { ...day } });
  }
}

function deleteItem(type, id, kind = "") {
  if (type === "place") {
    const places = state.places.filter((item) => item.id !== id);
    setState({ places, itinerary: buildAutoItinerary(places), modal: null });
    return;
  }

  if (type === "expense") {
    setState({ ledger: state.ledger.filter((item) => item.id !== id), modal: null });
    return;
  }

  if (type === "check") {
    setState({ [kind]: state[kind].filter((item) => item.id !== id), modal: null });
    return;
  }

  if (type === "note") {
    setState({ notes: state.notes.filter((item) => item.id !== id), modal: null });
  }
}

  const editing = state.editing;
  if (!editing) return;
  const draft = state.editDraft;

  if (editing.type === "trip") {
    setState({
      tripTitle: draft.tripTitle?.trim() || state.tripTitle,
      tripDates: draft.tripDates?.trim() || state.tripDates,
      exchangeRate: Number(draft.exchangeRate) || state.exchangeRate,

          : state.rateMeta,
      modal: null,
      editing: null,
      editDraft: {},
    });
    return;
  }

  if (editing.type === "day") {
    const days = state.days.map((day) =>
      day.id === editing.id
        ? {
            ...day,
            label: draft.label?.trim() || day.label,
            date: draft.date?.trim() || day.date,
            weekday: draft.weekday?.trim() || day.weekday,
            city: draft.city?.trim() || day.city,
          }
        : day,
    );
    setState({ days, itinerary: buildAutoItinerary(state.places), modal: null, editing: null, editDraft: {} });
    return;
  }

  if (editing.type === "place") {
    const original = state.places.find((place) => place.id === editing.id);
    if (!original) return;
    const updatedPlace = {
      ...original,
      name: draft.name?.trim() || original.name,
      city: draft.city?.trim() || original.city,
      area: draft.area?.trim() || original.area,
      tag: draft.tag?.trim() || original.tag,
      day: draft.day || original.day,
      stay: Number(draft.stay) || original.stay,
    };
    const places = state.places.map((place) =>
      place.id === editing.id ? updatedPlace : place,
    );
    const manualSchedule = updateManualItineraryStop(updatedPlace, draft.time);
    setState({
      places,
      itinerary: manualSchedule.itinerary,
      activeDay: manualSchedule.activeDay,
      activeSection: "itinerary",
      routeMode: "manual",
      modal: null,
      editing: null,

  if (editing.type === "expense") {

    const ledger = state.ledger.map((entry) =>

            ...entry,
            title: draft.title?.trim() || entry.title,
            amount: amount || entry.amount || entry.yen,
            currency,
            yen: currency === "JPY" ? amount || entry.yen : yenFromTwd(amount || entry.twd),

            day: draft.day?.trim() || entry.day,

    );
    setState({ ledger, modal: "ledger", editing: null, editDraft: {} });
    return;
  }

  if (editing.type === "check") {
    const kind = editing.kind;

      item.id === editing.id

            ...item,
            label: draft.label?.trim() || item.label,
            done: Boolean(draft.done),
            image: draft.image ?? item.image ?? "",
          }
        : item,
    );
    setState({ [kind]: rows, modal: null, editing: null, editDraft: {} });
    return;
  }

  if (editing.type === "note") {

      note.id === editing.id

            ...note,
            title: draft.title?.trim() || "",
            body: draft.body ?? "",
            image: draft.image ?? "",

}

function handleCalc(key) {
  if (key === "back") {
    setState({ yenInput: state.yenInput.slice(0, -1) || "0" });
    return;
  }
  if (key === "clear") {
    setState({ yenInput: "0" });
    return;
  }
  if (key === "=") {
    const amount = Number(state.yenInput || 0);
    if (!amount) return;
    const entry = {
      id: `e${Date.now()}`,
      title: `${getCurrentDay().label} 消費`,
      amount,
      currency: state.expenseCurrency,
      yen: state.expenseCurrency === "JPY" ? amount : yenFromTwd(amount),
      twd: state.expenseCurrency === "TWD" ? amount : twdFromYen(amount),
      day: getCurrentDay().label.split(" ")[0],
    };
    setState({ ledger: [entry, ...state.ledger], modal: "ledger" });
    return;
  }
  if (["+", "-"].includes(key)) return;

  const next = state.yenInput === "0" && key !== "." ? key : `${state.yenInput}${key}`;
  if (/^\d{0,8}(\.\d{0,2})?$/.test(next)) setState({ yenInput: next });
}

function isGoogleMapsUrl(value) {
  try {
    const url = new URL(value);
    return /(^|\.)google\./i.test(url.hostname) || /(^|\.)goo\.gl$/i.test(url.hostname) || url.hostname === "maps.app.goo.gl";
  } catch {

  }
}

function decodeHtmlText(value) {
  const unicodeDecoded = String(value || "")
    .replace(/\\u([0-9a-fA-F]{4})/g, (_, hex) => String.fromCharCode(parseInt(hex, 16)))
    .replace(/\\x([0-9a-fA-F]{2})/g, (_, hex) => String.fromCharCode(parseInt(hex, 16)));

  const textarea = document.createElement("textarea");
  textarea.innerHTML = unicodeDecoded;
  return textarea.value;
}

function cleanPlaceCandidate(value) {
  const cleaned = decodeHtmlText(value)
    .replaceAll("\\/", "/")
    .replace(/<[^>]*>/g, " ")
    .replace(/\s+/g, " ")
    .replace(/^[「『【\[(\s]+|[」』】\])\s]+$/g, "")
    .trim();

  if (cleaned.length < 2 || cleaned.length > 64) return "";
  if (/https?:|www\.|@|^\d+$/.test(cleaned)) return "";
  if (/Google|Maps|地圖|登入|隱私|條款|Cookie|搜尋|路線|分享|儲存|清單|評論|相片|附近|開啟|複製|查看|Sign in|Privacy|Terms|Reviews|Photos|Directions|Saved/i.test(cleaned)) {
    return "";
  }

  return cleaned;
}

function pushPlaceCandidate(candidates, value) {
  const cleaned = cleanPlaceCandidate(value);
  if (cleaned) candidates.push(cleaned);
}

function extractPlaceNamesFromSharedPage(text) {
  const decoded = decodeHtmlText(text);
  const candidates = [];

  Array.from(decoded.matchAll(/\/maps\/place\/([^/?#"\\]+)/g)).forEach((match) => {
    pushPlaceCandidate(candidates, decodeURIComponent(match[1]).replace(/\+/g, " "));
  });

  Array.from(decoded.matchAll(/[?&](?:q|query)=([^&#"\\]+)/g)).forEach((match) => {
    pushPlaceCandidate(candidates, decodeURIComponent(match[1]).replace(/\+/g, " "));
  });

  Array.from(decoded.matchAll(/"name"\s*:\s*"([^"]{2,80})"/g)).forEach((match) => {
    pushPlaceCandidate(candidates, match[1]);
  });

  Array.from(decoded.matchAll(/aria-label=["']([^"']{2,80})["']/g)).forEach((match) => {
    pushPlaceCandidate(candidates, match[1]);
  });

  decoded
    .replace(/<script[\s\S]*?<\/script>/gi, " ")
    .replace(/<style[\s\S]*?<\/style>/gi, " ")
    .replace(/<[^>]+>/g, "\n")
    .split(/\n|  +/)
    .forEach((line) => {
      if (/[\u3040-\u30ff\u3400-\u9fff]/.test(line)) pushPlaceCandidate(candidates, line);
    });

  return [...new Set(candidates)].slice(0, 80);
}

function cityFromText(text) {
  return /京都|kyoto|清水|祇園|伏見|嵐山|錦市場|河原町|二年坂|三年坂/i.test(text) ? "京都" : "大阪";
}

function buildImportedPlace(name, index, sourceText = "", area = "Google Maps") {
  const city = cityFromText(`${name} ${sourceText}`);
  const base = city === "京都" ? { lat: 35.0116, lng: 135.7681 } : { lat: 34.6937, lng: 135.5023 };

  return {
    id: `i${Date.now()}${index}`,
    name,
    city,
    area,
    lat: base.lat + (index % 4) * 0.01 - 0.015,
    lng: base.lng + (index % 5) * 0.012 - 0.018,
    stay: 75,
    tag: "匯入",
  };
}

function uniquePlaces(places, existing = []) {
  const seen = new Set(existing.map((place) => place.name.trim().toLowerCase()));
  return places.filter((place) => {
    const key = place.name.trim().toLowerCase();
    if (!key || seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

function mapsNameFromLine(line, index) {
  const urlMatch = line.match(/https?:\/\/\S+/);
  if (!urlMatch) return "";

  try {
    const url = new URL(urlMatch[0]);
    const queryName = url.searchParams.get("q") || url.searchParams.get("query");
    if (queryName) return decodeURIComponent(queryName).replace(/\+/g, " ");

    const placeIndex = url.pathname.split("/").findIndex((part) => part === "place");
    const placeName = url.pathname.split("/")[placeIndex + 1];
    if (placeName) return decodeURIComponent(placeName).replace(/\+/g, " ");
  } catch {
    return "";
  }

  return "";
}

function parseImport(text) {
  return text
    .split("\n")
    .map((line) => line.trim())
    .filter(Boolean)
    .map((line, index) => {
      const normalizedLine = line.replaceAll("\t", ",").replaceAll("｜", ",").replaceAll("|", ",");
      const [rawName, cityRaw, areaRaw, stayRaw] = normalizedLine.split(",").map((part) => part?.trim());
      const name = rawName && !/^https?:\/\//.test(rawName) ? rawName : mapsNameFromLine(line, index);
      if (!name) return null;
      const city = cityFromText(`${line} ${cityRaw || ""}`);
      const base = city === "京都" ? { lat: 35.0116, lng: 135.7681 } : { lat: 34.6937, lng: 135.5023 };
      return {
        id: `i${Date.now()}${index}`,
        name: name || `匯入景點 ${index + 1}`,
        city,
        area: areaRaw || city,
        lat: base.lat + (index % 4) * 0.01 - 0.015,
        lng: base.lng + (index % 5) * 0.012 - 0.018,
        stay: Number(stayRaw) || 75,
        tag: "匯入",
      };
    })
    .filter(Boolean);
}

async function fetchSharedGoogleList(url) {
  const candidates = [
    { label: "直接讀取", url },
    { label: "備援讀取", url: `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}` },
    { label: "備援讀取", url: `https://corsproxy.io/?${encodeURIComponent(url)}` },
  ];

  let lastError = "";
  for (const candidate of candidates) {
    try {
      const response = await fetch(candidate.url, { redirect: "follow" });
      if (!response.ok) throw new Error(`${response.status}`);
      const text = await response.text();
      const names = extractPlaceNamesFromSharedPage(text);
      if (names.length) return names.map((name, index) => buildImportedPlace(name, index, text));
      lastError = "連結可以讀取，但沒有找到景點名稱";
    } catch (error) {
      lastError = `${candidate.label}失敗`;
    }
  }

  throw new Error(lastError || "無法讀取 Google 清單");
}

async function importPlaces() {
  const sourceText = state.importText.trim();
  if (!sourceText || state.importBusy) return;

  const directRows = parseImport(sourceText);
  const googleUrls = extractUrls(sourceText).filter(isGoogleMapsUrl);
  let imported = [...directRows];

  if (googleUrls.length) {
    setState({
      importBusy: true,
      importStatus: "正在讀取 Google Maps 分享清單...",
    });

    const fetched = [];
    const failed = [];
    for (const url of googleUrls) {
      try {
        fetched.push(...(await fetchSharedGoogleList(url)));
      } catch {
        failed.push(url);
      }
    }

    imported = [...imported, ...fetched];

    if (failed.length && !fetched.length && !directRows.length) {
      setState({
        importBusy: false,
        importStatus:
          "這個 Google Maps 清單目前無法由網頁自動讀取。通常是清單未公開、Google 需要登入，或瀏覽器安全限制擋住。請把清單分享權限設為「知道連結的人可查看」後再試一次；若仍失敗，打開清單後複製景點名稱貼回這裡。",
      });
      return;
    }
  }

  imported = uniquePlaces(imported, state.places);
  if (!imported.length) {
    setState({
      importBusy: false,
      importStatus: "沒有找到新的景點。請貼 Google Maps 公開分享清單連結，或貼上景點名稱清單。",
    });
    return;
  }

  const places = [...state.places, ...imported];
  setState({
    places,
    itinerary: buildAutoItinerary(places),
    importText: "",
    importStatus: "",
    importBusy: false,
    modal: null,
    activeSection: "maps",
    routeMode: "auto",
  });
}

function moveStop(id, direction) {
  const stops = [...getCurrentStops()];
  const index = stops.findIndex((stop) => stop.id === id);
  const nextIndex = direction === "up" ? index - 1 : index + 1;
  if (index < 0 || nextIndex < 0 || nextIndex >= stops.length) return;

  const nextStops = stops.map((stop) => ({ ...stop }));
  [nextStops[index], nextStops[nextIndex]] = [nextStops[nextIndex], nextStops[index]];
  setState({
    itinerary: { ...state.itinerary, [state.activeDay]: nextStops },
    routeMode: "manual",
    activeSection: "itinerary",
  });
}

function addItem() {
  const name = state.addName.trim();

  if (state.addKind === "note") {
    const note = {
      id: `note${Date.now()}`,

      body: state.addDetail,
      image: state.addImage || "",
    };
    setState({
      notes: [note, ...state.notes],
      addName: "",
      addDetail: "",
      addImage: "",
      modal: null,
      activeSection: "notes",
    });
    return;
  }

  if (!name) return;

  if (state.addKind === "spot") {
    const day = getCurrentDay();
    const place = {
      id: `n${Date.now()}`,
      name,
      city: day.city,
      area: state.addDetail.trim() || day.city,
      lat: day.seed.lat + Math.random() * 0.03 - 0.015,
      lng: day.seed.lng + Math.random() * 0.03 - 0.015,
      stay: 75,
      tag: "新增",
      day: day.id,
    };
    const places = [...state.places, place];
    setState({
      places,
      itinerary: buildAutoItinerary(places),
      addName: "",
      addDetail: "",
      modal: null,
      activeSection: "maps",
    });
    return;
  }

  if (state.addKind === "expense") {
    const amount = Number(state.addDetail) || Number(state.yenInput) || 0;
    if (!amount) return;
    const entry = {
      id: `e${Date.now()}`,
      title: name,
      amount,
      currency: state.addCurrency || state.expenseCurrency,
      yen: (state.addCurrency || state.expenseCurrency) === "JPY" ? amount : yenFromTwd(amount),
      twd: (state.addCurrency || state.expenseCurrency) === "TWD" ? amount : twdFromYen(amount),
      day: getCurrentDay().label.split(" ")[0],
    };
    setState({ ledger: [entry, ...state.ledger], addName: "", addDetail: "", addImage: "", modal: null });
    return;
  }

  const key =
    state.addKind === "packing" ? "packing" : state.addKind === "food" ? "foods" : "souvenirs";
  setState({
    [key]: [...state[key], { id: `c${Date.now()}`, label: name, done: false, image: state.addImage || "" }],
    addName: "",
    addDetail: "",
    addImage: "",
    modal: null,
  });
}

              )
              .join("")}
          </div>
          <input id="addName" value="${safe(state.addName)}" placeholder="${
            state.addKind === "expense"
              ? "消費名稱"
              : state.addKind === "spot"
                ? "景點名稱"
                : state.addKind === "note"
                  ? "備註標題（可空白）"
                  : "清單項目"
          }" />
          ${state.addKind === "expense" ? renderCurrencyButtons(state.addCurrency || state.expenseCurrency, "setAddCurrency", "add") : ""}
          ${
            state.addKind === "note"
              ? `<textarea id="addDetail" placeholder="自由填寫備註內容">${safe(state.addDetail)}</textarea>`
              : `<input id="addDetail" value="${safe(state.addDetail)}" placeholder="${
                  state.addKind === "expense" ? "金額" : state.addKind === "spot" ? "區域 / 備註" : "備註可留空"
                }" />`
          }
          ${state.addKind === "souvenir" || state.addKind === "note" ? renderImageControls("add", state.addImage) : ""}
          <button class="primary wide" data-action="addItem">加入</button>
        </section>
      </div>
    `;
  }

  if (state.modal === "routeResult") {
    return `
      <div class="modal-backdrop" data-action="closeModal">
        <section class="modal sticker compact" role="dialog" aria-modal="true">
          <button class="modal-close" data-action="closeModal">關閉</button>
          <h2>順路排程完成</h2>
          <p>${state.days
            .map((day) => `${day.label}：${(state.itinerary[day.id] || []).length} 個景點`)
            .join("　")}</p>
          <a class="primary wide link-button" href="${mapsUrl()}" target="_blank" rel="noreferrer">打開目前日期路線</a>
        </section>
      </div>
    `;
  }

  return "";
}

function renderDrawer() {
  if (!state.drawerOpen) return "";
  const amount = Number(state.yenInput || 0);
  const activeCurrency = state.expenseCurrency;
  const convertedCurrency = activeCurrency === "JPY" ? "TWD" : "JPY";
  const convertedValue = activeCurrency === "JPY" ? twdFromYen(amount) : yenFromTwd(amount);
  return `
    <aside class="rate-drawer sticker" aria-label="浮動匯率計算機">
      <button class="modal-close" data-action="toggleDrawer">收起</button>
      <h2>匯率計算機</h2>
      <p>${activeCurrency} -> ${convertedCurrency} · 匯率 ${formatRate()}<span>${rateSourceText()}</span></p>
      <div class="mini-result">
        <span>${formatMoney(amount, activeCurrency)}</span>
        <strong>${formatMoney(convertedValue, convertedCurrency)}</strong>
      </div>
      <div class="mini-keys">
        ${["7", "8", "9", "4", "5", "6", "1", "2", "3", "0", "00", "back"]
          .map((key) => `<button data-action="calc" data-key="${key}">${key === "back" ? "刪除" : key}</button>`)
          .join("")}
      </div>
    </aside>
  `;
}

function readImageFile(file, target) {
  if (!file.type.startsWith("image/")) return;

  const reader = new FileReader();
  reader.addEventListener("load", () => {
    const image = String(reader.result || "");
    if (target === "edit") {
      setState({ editDraft: { ...state.editDraft, image } });
    } else {
      setState({ addImage: image });
    }
  });
  reader.readAsDataURL(file);
}

function render() {
  const currentDay = getCurrentDay();
  const yen = Number(state.yenInput || 0);
  const activeCurrency = state.expenseCurrency;
  const convertedCurrency = activeCurrency === "JPY" ? "TWD" : "JPY";
  const convertedValue = activeCurrency === "JPY" ? twdFromYen(yen) : yenFromTwd(yen);
  const completePacking = state.packing.filter((item) => item.done).length;
  const completeSouvenirs = state.souvenirs.filter((item) => item.done).length;
  const completeFoods = state.foods.filter((item) => item.done).length;
  const noteCount = state.notes.length;

  document.querySelector("#app").innerHTML = `
    <main class="app-shell ${state.modal ? "modal-active" : ""}">
      <nav class="side-nav sticker" aria-label="主要選單">
        ${[
          ["home", "首頁"],
          ["itinerary", "行程表"],
          ["expense", "記帳本"],
          ["packing", "行李"],
          ["souvenir", "購物清單"],
          ["food", "必吃清單"],
          ["notes", "備註"],
          ["maps", "地圖收藏"],
          ["settings", "設定"],
        ]
          .map(
            ([id, label]) =>
              `<button class="${state.activeSection === id ? "active" : ""}" data-action="section" data-section="${id}"><span>${label}</span></button>`,
          )
          .join("")}
      </nav>

      <section class="workspace">
        <header class="page-header">
          <div>
            <p>Travel Planner</p>
            <h1>${safe(state.tripTitle)} <span>${safe(state.tripDates)}</span></h1>
          </div>
          <div class="header-actions">
            <button class="outline-button" data-action="openTripSettings">編輯旅程</button>
          </div>
        </header>

        <section class="grid-board" aria-label="六宮格旅行規劃">
          <article class="${cardClass("itinerary", "itinerary-card")}" data-section-card="itinerary">
            <div class="card-title">
              <h2>行程表</h2>
              <button class="ghost-button" data-action="edit" data-type="day" data-id="${state.activeDay}">改日期</button>
            </div>
            <div class="date-tabs">${renderDateTabs()}</div>
            <div class="itinerary-body">
              <div class="timeline">${renderTimeline()}</div>
              <div class="map-box">
                <div class="map-preview" aria-label="順路排程地圖預覽"></div>
                <a href="${mapsUrl()}" target="_blank" rel="noreferrer">在 Google Maps 打開路線</a>
              </div>
            </div>
          </article>

          <article class="${cardClass("expense", "expense-card")}" data-section-card="expense">
            <div class="card-title">
              <h2>記帳本</h2>
              <button class="ghost-button" data-action="openLedger">記帳紀錄</button>
            </div>
            <div class="rate-line">
              <span>日幣 / 台幣匯率<small>${rateSourceText()}</small></span>
              <strong>匯率 ${formatRate()}</strong>
            </div>
            <div class="expense-tools">
              <div>
                <span>輸入幣別</span>
                ${renderCurrencyButtons(state.expenseCurrency, "setExpenseCurrency")}
              </div>
              <label>
                統一顯示
                <select data-action="displayCurrency">
                  <option value="TWD" ${state.displayCurrency === "TWD" ? "selected" : ""}>台幣 TWD</option>
                  <option value="JPY" ${state.displayCurrency === "JPY" ? "selected" : ""}>日幣 JPY</option>
                </select>
              </label>
            </div>
            <div class="expense-total">
              <span>目前總支出</span>
              <strong>${formatMoney(totalExpense(state.displayCurrency), state.displayCurrency)}</strong>
            </div>
            <div class="money-display">
              <label>${activeCurrency} <strong>${yen.toLocaleString()}</strong></label>
              <label>${convertedCurrency} <strong>${convertedValue.toLocaleString()}</strong></label>
            </div>
            <div class="calc-grid">
              ${["7", "8", "9", "back", "4", "5", "6", "+", "1", "2", "3", "-", "0", "00", ".", "="]
                .map(
                  (key) =>
                    `<button class="${key === "=" ? "equals" : ""}" data-action="calc" data-key="${key}">${key === "back" ? "刪" : key}</button>`,
                )
                .join("")}
            </div>
          </article>

          <article class="${cardClass("packing", "check-card")}" data-section-card="packing">
            <div class="card-title">
              <h2>行李</h2>
              <span>${completePacking}/${state.packing.length}</span>
            </div>
            <div class="check-list">${renderChecklist("packing")}</div>
          </article>

          <article class="${cardClass("souvenir", "check-card")}" data-section-card="souvenir">
            <div class="card-title">
              <h2>購物清單</h2>
              <span>${completeSouvenirs}/${state.souvenirs.length}</span>
            </div>
            <div class="check-list">${renderChecklist("souvenirs")}</div>
          </article>

          <article class="${cardClass("food", "check-card food-card")}" data-section-card="food">
            <div class="card-title">
              <h2>必吃清單</h2>
              <span>${completeFoods}/${state.foods.length}</span>
            </div>
            <div class="check-list">${renderChecklist("foods")}</div>
          </article>

          <article class="${cardClass("notes", "check-card notes-card")}" data-section-card="notes">
            <div class="card-title">
              <h2>備註</h2>
              <span>${noteCount}</span>
            </div>
            <div class="notes-list">${renderNotes()}</div>
          </article>

          <article class="${cardClass("maps", "maps-card")}" data-section-card="maps">
            <div class="card-title">
              <h2>Google Maps 收藏</h2>
              <button class="ghost-button" data-action="openImport">匯入景點</button>
            </div>
            <div class="maps-content">
              <div class="place-list">
                <div class="list-head">
                  <span>已匯入景點 (${state.places.length} 個)</span>
                  <strong>${currentDay.label}</strong>
                </div>
                ${renderPlaces()}
              </div>
              <div class="route-panel">
                <h3>順路排程</h3>
                <div class="route-mode">
                  <button class="${state.routeMode === "auto" ? "active" : ""}" data-action="autoArrange">自動排程</button>
                  <button class="${state.routeMode === "manual" ? "active" : ""}" data-action="setRouteMode" data-mode="manual">手動調整</button>
                </div>
                <label>
                  選擇日期
                  <select data-action="selectDay">
                    ${state.days
                      .map(
                        (day) =>
                          `<option value="${day.id}" ${day.id === state.activeDay ? "selected" : ""}>${day.label} ${day.date}</option>`,
                      )
                      .join("")}
                  </select>
                </label>
                <div class="route-doodle">
                  <span></span><i></i><span></span>
                </div>
                <p class="route-hint">${state.routeMode === "manual" ? "到行程表用每個景點旁的「上 / 下」調整順序。" : "匯入收藏後，會依城市與距離自動排順路。"}</p>
                <a href="${mapsUrl()}" target="_blank" rel="noreferrer" class="outline-link">查看排程結果</a>
              </div>
            </div>
          </article>
        </section>
      </section>

      <button class="floating-rate" data-action="toggleDrawer">匯率</button>
      <button class="bottom-add sticker" data-action="openAdd">+ 新增</button>
      ${renderModal()}
      ${renderDrawer()}
    </main>
  `;

}

document.addEventListener("click", (event) => {
  const target = event.target.closest("[data-action]");
  if (!target) return;

  const action = target.dataset.action;
  if (action === "section") {
    if (target.dataset.section === "settings") {
      openTripSettings();
    } else {
      focusSection(target.dataset.section);
    }
  }
  if (action === "day") setState({ activeDay: target.dataset.day, activeSection: "itinerary" });
  if (action === "selectDay") return;
  if (action === "calc") handleCalc(target.dataset.key);
  if (action === "toggle") toggleChecklist(target.dataset.kind, target.dataset.id);
  if (action === "setExpenseCurrency") setState({ expenseCurrency: target.dataset.currency });
  if (action === "setAddCurrency") setState({ addCurrency: target.dataset.currency });
  if (action === "setRouteMode") setState({ routeMode: target.dataset.mode, activeSection: "maps" });
  if (action === "moveStop") moveStop(target.dataset.id, target.dataset.direction);
  if (action === "openImport") setState({ modal: "import", activeSection: "maps", importStatus: "", importBusy: false });
  if (action === "importPlaces") importPlaces();
  if (action === "autoArrange") autoArrange();
  if (action === "openTripSettings") openTripSettings();
  if (action === "openLedger") setState({ modal: "ledger", activeSection: "expense" });
  if (action === "openAdd") setState({ modal: "add" });
  if (action === "addKind") setState({ addKind: target.dataset.kind });
  if (action === "addItem") addItem();
  if (action === "edit") openEdit(target.dataset.type, target.dataset.id, target.dataset.kind);
  if (action === "delete") deleteItem(target.dataset.type, target.dataset.id, target.dataset.kind);
  if (action === "saveEdit") saveEdit();
  if (action === "removeImage") {
    if (target.dataset.target === "edit") {
      setState({ editDraft: { ...state.editDraft, image: "" } });
    } else {
      setState({ addImage: "" });
    }
  }
  if (action === "toggleDrawer") setState({ drawerOpen: !state.drawerOpen });
  if (action === "closeModal" && event.target === target) setState({ modal: null });
});

document.addEventListener("change", (event) => {
  const select = event.target.closest("select[data-action='selectDay']");
  if (select) setState({ activeDay: select.value, activeSection: "maps" });

  const displayCurrency = event.target.closest("select[data-action='displayCurrency']");
  if (displayCurrency) setState({ displayCurrency: displayCurrency.value });

  const imageInput = event.target.closest("input[type='file'][data-image-target]");
  if (imageInput?.files?.[0]) readImageFile(imageInput.files[0], imageInput.dataset.imageTarget);

  const editField = event.target.closest("[data-edit-field]");
  if (editField) {
    const value = editField.type === "checkbox" ? editField.checked : editField.value;
    state.editDraft = { ...state.editDraft, [editField.dataset.editField]: value };
  }
});

document.addEventListener("input", (event) => {
  if (event.target.id === "importText") state.importText = event.target.value;
  if (event.target.id === "addName") state.addName = event.target.value;
  if (event.target.id === "addDetail") state.addDetail = event.target.value;
  if (event.target.id === "addImage") state.addImage = event.target.value;
  const editField = event.target.closest("[data-edit-field]");
  if (editField) {
    state.editDraft = { ...state.editDraft, [editField.dataset.editField]: editField.value };
  }
});

render();
requestAnimationFrame(syncActiveDateTab);
</script>
  </body>
</html>
